##########################
###### Key bindings ######

# change binding for leader key
set -g prefix C-z

# bind for refreshing settings
unbind r
bind r source-file ~/.tmux.conf

# set mouse support on
set -g mouse on

# set status bar to top
set-option -g status-position top

############################
###### Pane selection ######

# set bindings for pane selection
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R


############################
###### Copy and paste ######

# Enables system clipboard
set-option -g set-clipboard on

# Set vim-style keybindings in copy-mode
setw -g mode-keys vi

# Bind 'y' in copy-mode for yank to sys. clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"

# Bind 'p' to paste from system clipboard
bind-key p run-shell "tmux set-buffer \"$(xclip -o -selection clipboard)\"; tmux paste-buffer"


#################################
###### Tmux Plugin Manager ######

# List of plugins
set -g @plugin 'tmux-plugins/tpm'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'


###### Catppuccin ######
set -g default-terminal "tmux-256color"
set -g @catppuccin_flavour "mocha"
set -g @catppuccin_window_status_style "rounded"

# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"


