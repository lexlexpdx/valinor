    <h1>Images</h1>
    <p>This page covers common image formates, but you may also be looking for 
        <a href="./links.html">links</a> and <a href="./links_and_images/misc/extras.html">
            useful extras</a>
    </p>

    <h2>JPGs</h2>
    <p>JPG images are good for photos.</p>
    <img src="./links_and_images/images/mochi.jpg" width="75" alt="A mochi ball in a bubble">

    <h2>GIFs</h2>
    <p>GIFs are good for animations.</p>
    <img src="./links_and_images/images/mochi.gif" width="75" alt="A dancing mochi ball">

    <h2>PNGs</h2>
    <p>PNGs are good for diagrams and icons.</p>
    <img src="./links_and_images/images/mochi.png" width="75" alt="A mochi ball">

    <h2>SVGs</h2>
    <p>SVGs are <em>amazing</em>. Use them whenever you can.</p>
    <img src="./links_and_images/images/mochi.svg" alt="A mochi ball with Bezier handles">
</body>
