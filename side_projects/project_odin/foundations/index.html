<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>My first webpage</title>
    </head>

    <body>
        <p>This is a paragraph</p>
        <p>This is <em>another</em> paragraph with italics</p>
        <p>This is another paragraph with <strong>bold text</strong></p>
        <br>
        <p><strong>This is an unordered List</strong></p>
        <ul>
            <li>apples</li>
            <li>grapes</li>
            <li>bananas</li>
            <li>oranges</li>
        </ul>
        <p><em>This is an ordered list</em></p>
        <ol>
            <li>Wash dishes</li>
            <li>Clean shower</li>
            <li>Be stinky</li>
        </ol>
    </body>
</html>
